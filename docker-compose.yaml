services:

  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: memoria
      POSTGRES_USER: ${DB_USER:-memoria}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-memoria} -d memoria"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/memoria
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-memoria}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "4200:80"
    depends_on:
      - server

volumes:
  postgres_data: